<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KICKSCAN - Mundial 2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        display: ['"Bebas Neue"', 'sans-serif'],
                    },
                    colors: { 
                        'glass': 'rgba(255, 255, 255, 0.1)',
                        'correct': '#22c55e',
                        'wrong': '#ef4444'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">

    <style>
        /* Filtro: Desenfoque */
        .filter-blur { filter: blur(4px); }
        
        /* Filtro: Pixelado (Usa el SVG definido abajo) */
        .filter-pixel { filter: url(#svg-pixel); }

        /* Filtro: Cámara Térmica (Usa el SVG definido abajo) */
        .filter-thermal { filter: url(#svg-thermal) contrast(1.2); }

        /* Filtro: Ajuste de Color (Cambio de Tono/Hue) */
        .filter-hue { filter: hue-rotate(90deg) contrast(1.2); }

        /* Filtro: Pastel / Suavizado (Brillo alto, contraste bajo, saturación media) */
        .filter-pastel { filter: brightness(1.1) contrast(0.8) saturate(1.4) sepia(0.2); }

        /* Filtro: Alta Saturación (Vivid) */
        .filter-saturate { filter: saturate(3); }

        /* Normal */
        .filter-none { filter: none; }
    </style>

    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.147.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-three.prod.js"
      }
    }
    </script>
    
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/ar-logic.js"></script>
</head>
<body class="bg-black text-white overflow-hidden selection:bg-green-500">

    <svg style="display: none;">
        <defs>
            <filter id="svg-pixel">
                <feMorphology operator="dilate" radius="2" in="SourceGraphic" result="dilated"/>
                <feComposite in="dilated" in2="SourceGraphic" operator="atop"/>
            </filter>

            <filter id="svg-thermal">
                <feColorMatrix type="matrix" values="
                    3 -1 -1 0 0
                    -1 3 -1 0 0
                    -1 -1 3 0 0
                    0 0 0 1 0" />
            </filter>
        </defs>
    </svg>

    <div id="splash-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black transition-opacity duration-700">
        <div class="relative mb-8">
            <div class="absolute inset-0 bg-green-500/20 blur-3xl rounded-full animate-pulse"></div>
            <img src="assets/img/soccer.png" alt="Logo" class="logo-animado relative z-10 w-32 h-32 object-contain drop-shadow-[0_0_15px_rgba(34,197,94,0.5)]">
        </div>
        <h1 class="font-display text-6xl tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-green-600 mb-2 animate-bounce">KICKSCAN</h1>
        <p class="font-sans text-gray-400 tracking-[0.3em] text-sm uppercase">Experiencia Mundial 2026</p>
    </div>

    <section id="screen-home" class="hidden relative w-full h-screen overflow-hidden bg-black font-display">
        <div class="absolute inset-0 z-0"><canvas id="home-3d-canvas" class="w-full h-full object-cover"></canvas></div>
        <div class="absolute inset-0 z-10 flex flex-col justify-between p-8 pointer-events-none">
            <div class="mt-10 text-center">
                <h1 class="font-display text-7xl md:text-9xl text-transparent bg-clip-text bg-gradient-to-b from-white to-transparent opacity-80" style="-webkit-text-stroke: 1px white;">KICKSCAN</h1>
            </div>
            <div class="w-full flex justify-center pb-16 pointer-events-auto">
                <button onclick="window.irAEscanear()" class="group relative px-10 py-4 bg-white text-black font-display text-2xl tracking-widest hover:bg-green-600 hover:text-white transition-all duration-300 hover:scale-105 active:scale-95 shadow-[0_0_30px_rgba(255,255,255,0.2)]">
                    INICIAR ESCANEO
                </button>
            </div>
        </div>
    </section>

    <section id="screen-ar" class="hidden relative w-full h-screen bg-gray-900 overflow-hidden">
        <div id="ar-container" class="absolute inset-0 w-full h-full z-0"></div>
        
        <button onclick="window.volverAlHome()" class="absolute top-6 left-6 z-20 w-10 h-10 bg-black/50 backdrop-blur rounded-full flex items-center justify-center text-white border border-white/20 active:scale-90 transition-transform shadow-lg">✕</button>

        <div id="audio-controls" class="hidden absolute top-20 left-6 z-20 flex flex-col gap-3">
            <button onclick="window.ajustarVolumen(0.1)" class="w-10 h-10 bg-black/40 backdrop-blur rounded-full flex items-center justify-center text-white border border-white/10 active:scale-90 transition-transform hover:bg-green-600/50">➕</button>
            <button id="btn-mute" onclick="window.alternarMute()" class="w-10 h-10 bg-black/40 backdrop-blur rounded-full flex items-center justify-center text-white border border-white/10 active:scale-90 transition-transform hover:bg-white/20">🔊</button>
            <button onclick="window.ajustarVolumen(-0.1)" class="w-10 h-10 bg-black/40 backdrop-blur rounded-full flex items-center justify-center text-white border border-white/10 active:scale-90 transition-transform hover:bg-red-600/50">➖</button>
        </div>

        <button id="btn-confetti" onclick="window.lanzarConfettiManual()" class="hidden fixed top-6 right-6 z-[60] bg-yellow-400 text-black font-display text-lg tracking-wider py-2 px-6 rounded-full shadow-[0_0_20px_rgba(255,215,0,0.6)] hover:scale-105 transition-transform active:scale-95 border-2 border-white/50 animate-bounce">
            🎉 CONFETI
        </button>

        <div id="scan-guide" class="absolute inset-0 z-10 flex items-center justify-center pointer-events-none">
            <div class="w-64 h-64 border-2 border-white/30 rounded-3xl relative animate-pulse">
                <div class="absolute top-0 left-0 w-4 h-4 border-t-4 border-l-4 border-green-500 -mt-1 -ml-1"></div>
                <div class="absolute top-0 right-0 w-4 h-4 border-t-4 border-r-4 border-green-500 -mt-1 -mr-1"></div>
                <div class="absolute bottom-0 left-0 w-4 h-4 border-b-4 border-l-4 border-green-500 -mb-1 -ml-1"></div>
                <div class="absolute bottom-0 right-0 w-4 h-4 border-b-4 border-r-4 border-green-500 -mb-1 -mr-1"></div>
                <p class="absolute -bottom-12 w-full text-center font-sans text-sm font-bold text-white/80">Apunta al logo del país</p>
            </div>
        </div>

        <div id="bottom-sheet" class="fixed bottom-0 left-0 w-full h-[60vh] bg-gray-900/95 backdrop-blur-xl rounded-t-3xl transform translate-y-full transition-transform duration-300 ease-out z-30 border-t border-white/10 shadow-2xl flex flex-col overflow-hidden">
            
            <div id="sheet-header" class="flex-shrink-0 bg-gray-900/50 backdrop-blur-md">
                <div id="drag-handle" class="w-full p-4 flex justify-center cursor-grab active:cursor-grabbing touch-none bg-gradient-to-b from-white/5 to-transparent">
                    <div class="w-12 h-1.5 bg-gray-600 rounded-full"></div>
                </div>

                <div class="px-6 pt-2 pb-4 border-b border-white/10">
                    <h2 id="country-name" class="font-display text-5xl text-white tracking-wide">PAÍS</h2>
                </div>

                <div id="tab-navigation" class="flex justify-around items-center py-3 px-2 border-b border-white/10">
                    <button onclick="window.switchTab(this, 'stats')" class="tab-btn active p-3 rounded-xl transition-all duration-300 bg-green-600 text-white border border-green-400 shadow-[0_0_15px_rgba(34,197,94,0.3)]"><span class="text-2xl">📊</span></button>
                    <button onclick="window.switchTab(this, 'facts')" class="tab-btn p-3 rounded-xl transition-all duration-300 bg-white/5 text-gray-400 border border-white/10 hover:bg-white/10"><span class="text-2xl">💡</span></button>
                    <button onclick="window.switchTab(this, 'trivia')" class="tab-btn p-3 rounded-xl transition-all duration-300 bg-white/5 text-gray-400 border border-white/10 hover:bg-white/10"><span class="text-2xl">🧠</span></button>
                    <button onclick="window.verHighlights()" class="p-3 rounded-xl transition-all duration-300 bg-white/5 text-gray-400 border border-white/10 hover:bg-green-900/50 hover:border-green-700"><span class="text-2xl">🎬</span></button>
                </div>
            </div>

            <div id="sheet-content-container" class="flex-1 overflow-y-auto px-6 py-6 pb-12">
                <div id="content-stats" class="content-container space-y-6">
                    <h3 class="font-display text-2xl text-green-400 mb-4 uppercase tracking-wider">Estadísticas</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gradient-to-b from-white/10 to-transparent border border-white/10 p-5 rounded-2xl flex flex-col items-center shadow-inner">
                            <span class="text-4xl mb-2">🏆</span>
                            <span id="stat-titulos" class="font-display text-2xl text-white text-center leading-none tracking-wide">0</span>
                            <span class="text-xs text-gray-400 font-sans uppercase mt-1 tracking-widest">Títulos</span>
                        </div>
                        <div class="bg-gradient-to-b from-white/10 to-transparent border border-white/10 p-5 rounded-2xl flex flex-col items-center shadow-inner">
                            <span class="text-4xl mb-2">🌍</span>
                            <span id="stat-participaciones" class="font-display text-2xl text-white text-center leading-none tracking-wide">0</span>
                            <span class="text-xs text-gray-400 font-sans uppercase mt-1 tracking-widest">Mundiales</span>
                        </div>
                    </div>
                </div>
                <div id="content-facts" class="content-container hidden space-y-5">
                    <h3 class="font-display text-2xl text-green-400 mb-4 uppercase tracking-wider">Datos Curiosos</h3>
                    <div id="facts-items-container" class="space-y-4"></div>
                </div>
                <div id="content-trivia" class="content-container hidden space-y-6">
                    <h3 class="font-display text-2xl text-green-400 mb-4 uppercase tracking-wider">Trivia</h3>
                    <div id="trivia-items-container" class="space-y-6"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="screen-gallery" class="hidden fixed inset-0 z-[60] bg-gray-900 flex flex-col">
        <div class="p-4 flex items-center justify-between bg-black/80 backdrop-blur-md border-b border-white/10">
            <button onclick="window.cerrarGaleria()" class="text-white font-display text-xl tracking-wide flex items-center gap-2 hover:text-green-400 transition-colors">← VOLVER</button>
            <span id="gallery-title" class="font-display text-2xl text-green-400 tracking-wider">ACERVO HISTÓRICO</span>
        </div>
        
        <div class="flex-1 overflow-y-auto p-6">
            <div id="gallery-grid" class="grid grid-cols-2 gap-4 pb-10">
            </div>
        </div>
    </section>

    <section id="screen-highlights" class="hidden fixed inset-0 z-[70] bg-black flex flex-col">
        <div class="p-4 flex items-center justify-between bg-gradient-to-b from-black/80 to-transparent absolute top-0 w-full z-10">
            <button onclick="window.volverAGaleria()" class="text-white font-display text-lg tracking-wide flex items-center gap-2 hover:text-green-400 transition-colors">← GALERÍA</button>
            <span id="hl-title" class="font-display text-xl text-green-400">VIDEO</span>
        </div>
        <div class="relative flex-1 flex items-center justify-center bg-gray-900">
            <video id="highlight-video" class="w-full max-h-screen object-contain" loop playsinline controls></video>
        </div>
        
        <div class="absolute bottom-0 w-full bg-gradient-to-t from-black via-black/80 to-transparent p-6 pb-10 flex-shrink-0 z-10">
            <p class="text-center font-sans text-xs text-gray-400 mb-4 uppercase tracking-widest">Edición de Video</p>
            <div class="flex justify-start gap-3 overflow-x-auto pb-4 pt-2 px-2 scrollbar-hide">
                
                <button onclick="window.aplicarFiltroVideo('none')" class="filter-btn active px-4 py-2 rounded-full bg-white text-black text-xs font-bold font-sans flex-shrink-0 whitespace-nowrap">Normal</button>
                
                <button onclick="window.aplicarFiltroVideo('blur')" class="filter-btn px-4 py-2 rounded-full bg-white/10 text-white text-xs font-bold font-sans border border-white/10 flex-shrink-0 whitespace-nowrap">💧 Desenfoque</button>
                
                <button onclick="window.aplicarFiltroVideo('pixel')" class="filter-btn px-4 py-2 rounded-full bg-white/10 text-white text-xs font-bold font-sans border border-white/10 flex-shrink-0 whitespace-nowrap">👾 Pixelado</button>
                
                <button onclick="window.aplicarFiltroVideo('thermal')" class="filter-btn px-4 py-2 rounded-full bg-white/10 text-white text-xs font-bold font-sans border border-white/10 flex-shrink-0 whitespace-nowrap">🌡️ Térmica</button>
                
                <button onclick="window.aplicarFiltroVideo('hue')" class="filter-btn px-4 py-2 rounded-full bg-white/10 text-white text-xs font-bold font-sans border border-white/10 flex-shrink-0 whitespace-nowrap">🎨 Color</button>
                
                <button onclick="window.aplicarFiltroVideo('pastel')" class="filter-btn px-4 py-2 rounded-full bg-white/10 text-white text-xs font-bold font-sans border border-white/10 flex-shrink-0 whitespace-nowrap">🌸 Pastel</button>

                <button onclick="window.aplicarFiltroVideo('saturate')" class="filter-btn px-4 py-2 rounded-full bg-white/10 text-white text-xs font-bold font-sans border border-white/10 flex-shrink-0 whitespace-nowrap">🔥 Intenso</button>

            </div>
        </div>
    </section>
</body>
</html>
